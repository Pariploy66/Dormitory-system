name: student_access_app
description: Student Access Monitoring for Parents
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Firebase (Push Notifications)
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.1.2

  # Routing
  go_router: ^13.2.1

  # Storage (JWT token persistence)
  flutter_secure_storage: ^9.0.0

  # UI helpers
  intl: ^0.19.0
  timeago: ^3.6.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/