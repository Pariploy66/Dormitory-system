name: student_access_app
description: Student Access Monitoring for Parents
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Localization delegates (Material/Cupertino/Widgets) for EN + TH
  flutter_localizations:
    sdk: flutter

  # State management — company pattern: flutter_bloc + equatable
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # HTTP
  dio: ^5.4.3+1

  # Firebase (Push Notifications)
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.1.2

  # Routing
  go_router: ^13.2.1

  # Storage (JWT token persistence)
  flutter_secure_storage: ^9.0.0

  # Real-time (Socket.IO — NewSystem pattern)
  socket_io_client: ^2.0.3+1

  # UI helpers
  intl: ^0.20.2
  timeago: ^3.6.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^1.0.3
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
